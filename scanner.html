<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>flowerOS Scanner — $MISANTHROPIC</title>
  <meta name="description" content="FlowerOS Scanner. Real-time trending Solana tokens. Zero humans required.">
  <link rel="icon" href="assets/flower.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="scanner.css">
</head>
<body>

  <!-- Noise + ambient -->
  <div class="noise" aria-hidden="true"></div>
  <div class="sc-radial-overlay" aria-hidden="true"></div>

  <!-- Decorative watermark -->
  <div class="sc-watermark" aria-hidden="true">flowerOS SCANNER</div>

  <!-- Scanner Page -->
  <div class="sc-page">

    <!-- Header bar -->
    <header class="sc-header">
      <a href="index.html" class="sc-back" id="scBack" aria-label="Back to main site">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5"/><path d="m12 5-7 7 7 7"/></svg>
        <span>Back</span>
      </a>

      <div class="sc-header-center">
        <span class="sc-header-title">
          <span class="sc-scan-dot" aria-label="Live scanning"></span>
          flowerOS Scanner
        </span>
      </div>

      <div class="sc-meta" id="scMeta">
        <span id="scUpdatedLabel">Scanning...</span>
        <button class="sc-refresh-btn" id="scRefreshBtn" title="Manual refresh" aria-label="Refresh data">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
        </button>
      </div>
    </header>

    <!-- Main content -->
    <main class="sc-main" id="scMain">

      <!-- Loading state (skeleton grid) -->
      <div class="sc-grid" id="scSkeletonGrid" aria-hidden="true">
        <div class="sc-skeleton-card"><div class="sc-sk-top"></div><div class="sc-sk-body"><div class="sc-sk-line sc-sk-line--wide"></div><div class="sc-sk-line sc-sk-line--narrow"></div><div class="sc-sk-row"><div class="sc-sk-block"></div><div class="sc-sk-block"></div></div></div></div>
        <div class="sc-skeleton-card"><div class="sc-sk-top"></div><div class="sc-sk-body"><div class="sc-sk-line sc-sk-line--wide"></div><div class="sc-sk-line sc-sk-line--narrow"></div><div class="sc-sk-row"><div class="sc-sk-block"></div><div class="sc-sk-block"></div></div></div></div>
        <div class="sc-skeleton-card"><div class="sc-sk-top"></div><div class="sc-sk-body"><div class="sc-sk-line sc-sk-line--wide"></div><div class="sc-sk-line sc-sk-line--narrow"></div><div class="sc-sk-row"><div class="sc-sk-block"></div><div class="sc-sk-block"></div></div></div></div>
        <div class="sc-skeleton-card"><div class="sc-sk-top"></div><div class="sc-sk-body"><div class="sc-sk-line sc-sk-line--wide"></div><div class="sc-sk-line sc-sk-line--narrow"></div><div class="sc-sk-row"><div class="sc-sk-block"></div><div class="sc-sk-block"></div></div></div></div>
        <div class="sc-skeleton-card"><div class="sc-sk-top"></div><div class="sc-sk-body"><div class="sc-sk-line sc-sk-line--wide"></div><div class="sc-sk-line sc-sk-line--narrow"></div><div class="sc-sk-row"><div class="sc-sk-block"></div><div class="sc-sk-block"></div></div></div></div>
        <div class="sc-skeleton-card"><div class="sc-sk-top"></div><div class="sc-sk-body"><div class="sc-sk-line sc-sk-line--wide"></div><div class="sc-sk-line sc-sk-line--narrow"></div><div class="sc-sk-row"><div class="sc-sk-block"></div><div class="sc-sk-block"></div></div></div></div>
      </div>

      <!-- Loading text -->
      <p class="sc-loading-text" id="scLoadingText">Scanning the blockchain...</p>

      <!-- Coin grid (populated by JS) -->
      <div class="sc-grid sc-coins-grid hidden" id="scCoinsGrid" role="list" aria-label="Trending coins"></div>

      <!-- Error state -->
      <div class="sc-error hidden" id="scError">
        <div class="sc-error-icon">🌸</div>
        <p class="sc-error-msg" id="scErrorMsg">Even the blockchain is ignoring you.</p>
        <button class="sc-retry-btn" id="scRetryBtn">Try Again</button>
      </div>

    </main>

    <!-- Footer hint -->
    <footer class="sc-footer">
      <span>flowerOS. All rights reserved <a href="https://x.com/getmisanthropic" target="_blank" rel="noopener noreferrer" style="color: inherit; text-decoration: underline; text-decoration-color: rgba(255,255,255,0.2); text-underline-offset: 3px; transition: color 0.2s;">@getmisanthropic</a></span>
    </footer>

  </div>

  <script src="scanner.js" defer></script>
</body>
</html>
